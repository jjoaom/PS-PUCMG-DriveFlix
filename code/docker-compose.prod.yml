services:
  db:
    image: postgres:17-alpine
    container_name: postgres_db
    environment:
      POSTGRES_DB: appdb
      POSTGRES_USER: avnadmin
      POSTGRES_PASSWORD: AVNS_9lSBDz3jXFQYFgz9yrE
    volumes:
      - db_data:/var/lib/postgresql/data
    networks:
      - backend

  backend:
    build:
      context: ./backend
    container_name: micronaut_app
    ports:
      - "8080:8080"
    environment:
      DATASOURCES_DEFAULT_URL: jdbc:postgresql://db:5432/appdb
      DATASOURCES_DEFAULT_USERNAME: avnadmin
      DATASOURCES_DEFAULT_PASSWORD: AVNS_9lSBDz3jXFQYFgz9yrE
    depends_on:
      - db
    networks:
      - backend

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
    container_name: react_prod
    ports:
      - "5173:80"
    depends_on:
      - backend
    networks:
      - backend

networks:
  backend:
    driver: bridge

volumes:
  db_data: